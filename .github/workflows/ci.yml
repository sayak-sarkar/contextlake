name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: core (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core only)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Test core (no knowledge layer)
        run: pytest --ignore=tests/kb --cov=gitlab_sync --cov-report=term-missing

  kb:
    name: knowledge-layer (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The [kb] extra needs Python >= 3.10 (mcp's floor).
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with knowledge layer)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,kb]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Test full suite
        run: pytest --cov=gitlab_sync --cov-report=term-missing
