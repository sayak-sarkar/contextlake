name: release

# Publish to PyPI via Trusted Publishing (OIDC) when a vX.Y.Z tag is pushed.
# No API token is stored anywhere: the publish job mints a short-lived OIDC
# token that PyPI trusts for this repo + workflow. See docs/releasing.md.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: build & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (dev + build tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build twine

      - name: Tag must match the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$tag  pyproject=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg — bump the version before tagging"
            exit 1
          fi

      - name: Lint + core tests (release gate)
        run: |
          ruff check src tests
          pytest --ignore=tests/kb -q

      - name: Build sdist + wheel
        run: |
          rm -rf dist
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/contextlake/
    permissions:
      id-token: write   # required for OIDC / Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
