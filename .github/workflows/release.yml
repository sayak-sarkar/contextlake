name: release

# Publish to PyPI via Trusted Publishing (OIDC) when a vX.Y.Z tag is pushed.
# No API token is stored anywhere: the publish job mints a short-lived OIDC
# token that PyPI trusts for this repo + workflow. See docs/releasing.md.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: build & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (dev + build tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build twine

      - name: Tag must match the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$tag  pyproject=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg — bump the version before tagging"
            exit 1
          fi

      - name: Lint + core tests (release gate)
        run: |
          ruff check src tests
          pytest --ignore=tests/kb -q

      - name: Build sdist + wheel
        run: |
          rm -rf dist
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/contextlake/
    permissions:
      id-token: write   # required for OIDC / Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  docker:
    name: publish image (ghcr.io)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GitHub Container Registry
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build & push (bundles deps + pre-downloaded models)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: github release
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create / update the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release from the CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull this version's section out of CHANGELOG.md for the release notes.
          awk -v v="$version" 'index($0,"## ["v"]")==1{f=1;next} f&&/^## \[/{exit} f{print}' \
            CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "Release $GITHUB_REF_NAME" > notes.md
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "contextlake $version" --notes-file notes.md
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "contextlake $version" --notes-file notes.md --verify-tag
          fi
