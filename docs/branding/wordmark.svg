<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 312 64" width="312" height="64" role="img" aria-label="contextlake">
  <title>contextlake</title>
  <desc>The contextlake wordmark: the glyph followed by the lowercase name. Uses live text (Space Grotesk); outline to paths before shipping a locked logo.</desc>
  <defs>
    <clipPath id="wtile"><rect x="2" y="2" width="60" height="60" rx="14"/></clipPath>
  </defs>

  <!-- glyph -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#EAF4F4"/>
  <g clip-path="url(#wtile)">
    <rect x="2" y="26" width="60" height="12" fill="#2BB3A3"/>
    <rect x="2" y="38" width="60" height="12" fill="#137A8B"/>
    <rect x="2" y="50" width="60" height="12" fill="#0E2A33"/>
    <g fill="none" stroke="#EAF4F4" stroke-width="2" stroke-linecap="round" opacity="0.75">
      <path d="M23 28 q9 4 18 0"/>
      <path d="M16 32 q16 5 32 0"/>
    </g>
  </g>
  <rect x="2" y="24" width="60" height="2.5" fill="#137A8B"/>
  <path d="M32 7 C 35 12, 37 14, 37 17 a5 5 0 1 1 -10 0 C 27 14, 29 12, 32 7 Z" fill="#E7B53C"/>

  <!-- wordmark -->
  <text x="76" y="42" font-family="'Space Grotesk','Segoe UI',sans-serif" font-weight="700"
        font-size="30" letter-spacing="-0.5">
    <tspan fill="#0E2A33">context</tspan><tspan fill="#137A8B">lake</tspan>
  </text>
</svg>
